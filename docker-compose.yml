version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: legalai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pakistan_legal_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - legalai_network

  redis:
    image: redis:7-alpine
    container_name: legalai_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - legalai_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: legalai_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-changeme_in_production}@postgres:5432/pakistan_legal_ai
      DB_HOST: postgres
      DB_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL: claude-sonnet-4-6
      CORS_ORIGIN: ${FRONTEND_URL:-http://localhost:3000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - '5000:5000'
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    networks:
      - legalai_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: legalai_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${BACKEND_PUBLIC_URL:-http://localhost:5000/api/v1}
      NEXT_PUBLIC_APP_NAME: Pakistan Legal AI Agent
    ports:
      - '3000:3000'
    networks:
      - legalai_network

  nginx:
    image: nginx:alpine
    container_name: legalai_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deployment/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deployment/ssl:/etc/nginx/ssl:ro
    networks:
      - legalai_network

networks:
  legalai_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
  backend_logs:
