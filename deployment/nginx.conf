# Pakistan Legal AI Agent - Nginx Reverse Proxy Configuration

upstream frontend_upstream {
    server frontend:3000;
}

upstream backend_upstream {
    server backend:5000;
}

server {
    listen 80;
    server_name legalpk.ai www.legalpk.ai;

    client_max_body_size 50M;

    # Redirect HTTP to HTTPS in production - uncomment below
    # return 301 https://$host$request_uri;

    # Frontend
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 120s;
    }

    # Uploaded documents (served by backend)
    location /uploads/ {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
    }

    # Health check
    location /health {
        proxy_pass http://backend_upstream/health;
    }
}

